name: AppImage (Linux)

# On-demand Linux AppImage for sharing/testing — kept SEPARATE from the release
# workflow so a Linux build issue never jeopardizes the Windows auto-update.
# Trigger by pushing a tag like `appimage-v0.10.2` (builds that commit), or run
# manually. Uploads the .AppImage as a downloadable workflow artifact.
#
# Clean by construction: the build embeds NO keys/secrets — a fresh install
# starts with an empty ~/.ares, so a tester evolves their own agent from scratch.

on:
  push:
    tags:
      - "appimage-*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Tauri v2 Linux system dependencies (webkit2gtk 4.1 for the WebView).
      - name: Install Linux Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev build-essential \
            curl wget file libssl-dev libxdo-dev pkg-config

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      # Bundles the embedded node + CLI runtime; node binary is the host's
      # (Linux node here), so the runtime is Linux-native.
      - name: Build embedded runtime
        run: pnpm --filter ares-tauri build:runtime

      # tauri-action with no tag/release params = build only (no GitHub release).
      # Signing secrets are needed because tauri.conf createUpdaterArtifacts=true.
      - name: Build AppImage
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri
          args: --bundles appimage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ares-Linux-AppImage
          path: tauri/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
