<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Ares — Living Surface (Beta)</title>
    <style>
      html, body, #root { width: 100%; height: 100%; margin: 0; background: #050605; color: #e9e0d2; }
      body { overflow: hidden; font-family: "Segoe UI", sans-serif; }
      #living-boot { position: fixed; inset: 0; display: grid; place-items: center; background: #050605; }
      #living-boot div { display: grid; justify-items: center; gap: 14px; }
      #living-boot i { width: 26px; height: 26px; border: 1px solid rgba(239,91,50,.25); border-top-color: #ef5b32; border-radius: 50%; animation: living-boot-spin .75s linear infinite; }
      #living-boot strong { color: #ef5b32; font: 700 10px/1 "Cascadia Mono", monospace; letter-spacing: .28em; }
      @keyframes living-boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"><div id="living-boot"><div><i></i><strong>WAKING THE SURFACE</strong></div></div></div>
    <script type="module" src="/src/living.tsx"></script>
  </body>
</html>
